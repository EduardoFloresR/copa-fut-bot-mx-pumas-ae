project:
  name: "Copa FutBotMX - PUMAS AE"
  description: "Pipeline de visión por computadora para análisis de futbol robótico."
  version: "0.1.0"
  team: "PUMAS AE"

paths:
  raw_data_dir: "data/raw"
  clips_dir: "data/clips"
  frames_dir: "data/frames"
  annotations_dir: "data/annotations"
  processed_dir: "data/processed"

  masks_dir: "outputs/masks"
  tracks_dir: "outputs/tracks"
  figures_dir: "outputs/figures"
  videos_dir: "outputs/videos"
  logs_dir: "outputs/logs"

video:
  target_width: 960
  target_fps: 10
  initial_clip_start: "00:00:10"
  initial_clip_duration: "00:00:20"
  input_video_name: "video_original.mp4"
  working_clip_name: "test_20s_960px_10fps.mp4"
  frame_pattern: "frame_%06d.jpg"

sam3:
  model_name: "facebook/sam3"
  device: "cuda"
  use_text_prompts: true
  use_visual_prompts: false

  prompts:
    field: "playing field"
    ball: "soccer ball"
    robot: "robot soccer player"
    ally_robot: "blue robot"
    opponent_robot: "red robot"
    goal: "goal"

segmentation:
  min_mask_area_px: 50
  save_raw_masks: true
  save_overlay_frames: true
  overlay_alpha: 0.45

  classes:
    - field
    - ball
    - ally_robot
    - opponent_robot
    - goal

tracking:
  method: "centroid_distance"
  max_assignment_distance_px: 80
  max_missing_frames: 5
  min_track_length_frames: 3

events:
  enable_event_detection: true

  possession:
    enabled: true
    distance_threshold_px: 60

  pass:
    enabled: true
    min_possession_time_s: 0.5

  interception:
    enabled: true

  shot:
    enabled: true
    speed_threshold_px_s: 250

  collision:
    enabled: true
    distance_threshold_px: 40

visualization:
  draw_masks: true
  draw_bounding_boxes: true
  draw_centroids: true
  draw_labels: true
  draw_trajectories: true
  trajectory_length_frames: 50

  generate_heatmap: true
  generate_possession_plot: true
  generate_event_timeline: true

outputs:
  save_tracks_csv: true
  save_events_csv: true
  save_demo_video: true
  demo_video_max_duration_s: 120

logging:
  level: "INFO"
  save_logs: true
